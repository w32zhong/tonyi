services:

  gateway:
    image: gateway:latest
    build:
      context: ./app/gateway
      dockerfile: Dockerfile
    ports:
      - 80:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gateway_net

  echo8921:
    image: approach0/echo-httpd
    ports:
      - 8921:8080
    networks:
      - gateway_net
    command: "node hello.js echo8921"
    deploy:
      labels:
        gateway.route: foo
        gateway.port: 8080
        gateway.limits: '{"rate": 100, "conn": 1}'

  echo8922:
    image: approach0/echo-httpd
    ports:
      - 8922:8080
    networks:
      - gateway_net
    command: "node hello.js echo8922"
    deploy:
      labels:
        gateway.route: bar
        gateway.port: 8080
        gateway.limits: '{"rate": 1, "conn": 50}'

networks:
  gateway_net:
    driver: overlay
    attachable: true
