services:

  gateway:
    image: gateway:latest
    build:
      context: ./app/gateway
      dockerfile: Dockerfile
    environment:
      - DEFAULT_REQ_RATE=$GATEWAY_DEFAULT_REQ_RATE
      - DEFAULT_BURST=$GATEWAY_DEFAULT_BURST
      - DEFAULT_CONN_MAX=$GATEWAY_DEFAULT_CONN_MAX
      - JWT_COOKIE_NAME=jwt_token # ngx.var.cookie_* must be lower-case and no-hyphen
      - JWT_SECRET_URL=auth:19721/secret
      - DOMAIN=$GATEWAY_DOMAIN
    ports:
      - target: 443
        published: 80
        mode: host # to pass in REAL IP
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gateway_net
    entrypoint: ["./entrypoint.sh", "$DOMAIN"]

  echo1:
    image: approach0/echo-httpd
    networks:
      - gateway_net
    command: "node hello.js echo1"
    deploy:
      labels:
        gateway.route: foo
        gateway.port: 8080
        gateway.limits: '{"rate": 10, "burst": 10, "conn": 1}'

  echo2:
    image: approach0/echo-httpd
    networks:
      - gateway_net
    command: "node hello.js echo2"
    deploy:
      labels:
        gateway.route: bar
        gateway.port: 8080
        gateway.limits: '{"rate": 1, "burst": 0, "conn": 10}'

  echo3:
    image: approach0/echo-httpd
    networks:
      - gateway_net
    command: "node hello.js echo3"
    deploy:
      labels:
        gateway.route: baz
        gateway.port: 8080
        gateway.protect: /protected,/private

  auth:
    image: auth:latest
    build:
      context: ./app/auth
      dockerfile: Dockerfile
    environment:
      - DB_URL=postgresql://${DB_USER}:${DB_PASS}@wireguard_server:5432/backend_db
      - PYTHONUNBUFFERED=1 # flush python print immediately
      - JWT_COOKIE_NAME=JWT_Token
      - LOGIN_MAX_ATTEMPTS=10
      - JWT_EXPIRE_DAYS=5
    deploy:
      labels:
        gateway.route: auth
        gateway.port: 19721
        gateway.limits: '{"rate": 1, "burst": 10, "conn": 10}'
        gateway.internal: /secret
    networks:
      - gateway_net
      - proxy_net

  auth_test:
    image: auth:latest
    build:
      context: ./app/auth
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1 # flush python print immediately
      - JWT_COOKIE_NAME=JWT_Token
      - AUTH_BASE_URL=/auth
      - REDIRECT_URL_PREFIX=/auth-test/login?next=
    command: ["python", "middleware/python/server.py"]
    deploy:
      labels:
        gateway.route: auth-test
        gateway.port: 18000
    networks:
      - gateway_net

  ui_404:
    image: ui_404:latest
    build:
      context: ./app/ui_404
      dockerfile: Dockerfile
      args:
        - REDIRECT_URL=/
        - REDIRECT_TIMEOUT=10
    deploy:
      labels:
        gateway.route: _404_
        gateway.port: 8080
    networks:
      - gateway_net

  ui_login:
    image: ui_login:latest
    build:
      context: ./app/ui_login
      dockerfile: Dockerfile
      args:
        - AUTH_BASE_URL=/auth
        - ADMIN_EMAIL=admin@localhost.me
    deploy:
      labels:
        gateway.route: login
        gateway.port: 8080
    networks:
      - gateway_net

networks:
  gateway_net:
    driver: overlay
    attachable: true
  proxy_net:
    external: true
    name: proxy_net
