services:

  etcd:
    image: bitnamilegacy/etcd:3.5.11
    restart: always
    volumes:
      - etcd_data:/bitnami/etcd
    environment:
      ETCD_ENABLE_V2: "true"
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    networks:
      - gateway_net

  prometheus:
    image: prom/prometheus:v2.25.0
    restart: always
    volumes:
      - ./app/gateway/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      gateway_net:

  gateway:
    image: apache/apisix:3.15.0-debian
    restart: always
    ports:
      - target: 80
        published: 80 # HTTP
        mode: host
      - target: 443
        published: 443 # HTTPS
        mode: host

      # # route admin API, or /ui for a built-in UI
      # - target: 9180
      #   published: 9180
      #   mode: ingress

      # Prometheus metrics, /apisix/prometheus/metrics
      #- "9091:9091/tcp"
    environment:
      - APISIX_ADMIN_KEY=${GATEWAY_ADMIN_KEY}
      - APISIX_VIEWER_KEY=${GATEWAY_VIEWER_KEY}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./app/gateway/apisix.yml:/usr/local/apisix/conf/config.yaml:ro
    depends_on:
      - etcd
    networks:
      - gateway_net
    deploy:
      # (1) all nodes run exactly one gateway,
      # (2) configure DNS A records or a Load Balancer to round-robin each nodes.
      mode: global

  acme:
    image: neilpang/acme.sh
    volumes:
      - acme_data:/acme.sh
    environment:
      - DOMAIN=${GATEWAY_DOMAIN}
    entrypoint:
      - "sh"
      - "-c"
      - |
        if ! acme.sh --list | grep -q "$$DOMAIN"; then
          # verify domain ownership by creating .well-known/acme-challenge at /acme.sh
          acme.sh --issue -d $$DOMAIN -d www.$$DOMAIN --webroot /acme.sh --server letsencrypt
        else
          echo "auto renew cronjob is on!"
          cat /acme.sh/crontab
        fi
        echo "======================================================================="
        echo "To revoke: acme.sh --revoke -d $$DOMAIN -d www.$$DOMAIN"
        echo "To renew manually: acme.sh --renew -d $$DOMAIN -d www.$$DOMAIN --force"
        echo "======================================================================="
        sh entry.sh daemon
    depends_on:
      - service_discovery

  well_known:
    image: busybox:stable
    volumes:
      - acme_data:/acme_data
    # ports:
    #   - "8080:80"
    entrypoint:
      - "sh"
      - "-c"
      - |
        mkdir -p /acme_data/.well-known /www
        ln -s /acme_data/.well-known /www/.well-known
        echo test > /www/.well-known/test
        busybox httpd -f -p 80 -h /www/.well-known
    deploy:
      labels:
        gateway.route: .well-known
        gateway.route_priority: 100
    depends_on:
      - acme
    networks:
      - gateway_net

  service_discovery:
    image: node:18-slim
    working_dir: /app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./app/gateway/discovery.js:/app/discovery.js
      - acme_data:/acme.sh:ro
    environment:
      - APISIX_ADMIN_URL=http://gateway:9180/apisix/admin
      - APISIX_ADMIN_KEY=${GATEWAY_ADMIN_KEY}
      - JWT_SECRET_URL=auth:19721/secret
      - JWT_COOKIE_NAME=JWT_Token
      - DEFAULT_REQ_RATE=${GATEWAY_DEFAULT_REQ_RATE}
      - DEFAULT_BURST=${GATEWAY_DEFAULT_BURST}
      - DEFAULT_CONN_MAX=${GATEWAY_DEFAULT_CONN_MAX}
      - GATEWAY_DOMAIN=${GATEWAY_DOMAIN}
      - GATEWAY_CF_PROTECT=${GATEWAY_CF_PROTECT}
    networks:
      - gateway_net
    entrypoint:
      - "bash"
      - "-c"
      - |
        npm install dockerode axios
        node discovery.js
    deploy:
      placement:
        constraints:
          - node.role == manager

  echo0:
    image: approach0/echo-httpd
    networks:
      - gateway_net
    command: "node hello.js echo0"
    deploy:
      labels:
        gateway.route: _root_
        gateway.port: 8080

  echo1:
    image: approach0/echo-httpd
    networks:
      - gateway_net
    command: "node hello.js echo1"
    deploy:
      labels:
        gateway.route: test_conn_limit
        gateway.port: 8080
        gateway.limits: '{"rate": 10, "burst": 10, "conn": 1}'
      endpoint_mode: dnsrr

  echo2:
    image: approach0/echo-httpd
    networks:
      - gateway_net
    command: "node hello.js echo2"
    deploy:
      labels:
        gateway.route: test_rate_limit
        gateway.port: 8080
        gateway.limits: '{"rate": 1, "burst": 0, "conn": 10}'

  echo3:
    image: approach0/echo-httpd
    networks:
      - gateway_net
    command: "node hello.js echo3"
    deploy:
      labels:
        gateway.route: test_route_protect
        gateway.port: 8080
        gateway.protect: '["/protected", "/private"]'
        gateway.internal: '["/internal"]'

  auth:
    image: auth:latest
    build:
      context: ./app/auth
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DB_URL=postgresql://${DB_USER}:${DB_PASS}@wireguard_server:5432/backend_db
      - LOGIN_MAX_ATTEMPTS=10
      - JWT_EXPIRE_DAYS=5
      - JWT_COOKIE_NAME=JWT_Token
      - REDIRECT_URL=/u/login
      - REDIRECT_URL_ARGKEY=next
      - OAUTH2_PROVIDERS=google,github
      - OAUTH2_CALLBK_PREFIX=https://__REQ_DOMAIN__/auth
      - OAUTH2_GOOGLE_CLIENT_ID=${OAUTH2_GOOGLE_CLIENT_ID}
      - OAUTH2_GOOGLE_CLIENT_SECRET=${OAUTH2_GOOGLE_CLIENT_SECRET}
      - OAUTH2_GITHUB_CLIENT_ID=${OAUTH2_GITHUB_CLIENT_ID}
      - OAUTH2_GITHUB_CLIENT_SECRET=${OAUTH2_GITHUB_CLIENT_SECRET}
      - EMAIL_SMTP_KEY=${EMAIL_SMTP_KEY}
      - EMAIL_DOMAIN=${EMAIL_DOMAIN}
    deploy:
      labels:
        gateway.route: auth
        gateway.port: 19721
        gateway.limits: '{"rate": 1, "burst": 10, "conn": 10}'
        gateway.internal: '["/secret"]'
    networks:
      - gateway_net
      - proxy_net

  auth_test:
    image: auth:latest
    build:
      context: ./app/auth
      dockerfile: Dockerfile
    command: ["node", "test/server.js"]
    environment:
      - JWT_COOKIE_NAME=JWT_Token # for logout to know how to reset cookie
      - AUTH_BASE_URL=/auth
      - REDIRECT_URL=/auth-test/login
      - REDIRECT_URL_ARGKEY=next
    deploy:
      labels:
        gateway.route: auth-test
        gateway.port: 3000
    networks:
      - gateway_net

  ui_login:
    image: ui_login:latest
    build:
      context: ./app/ui_login
      dockerfile: Dockerfile
      args:
        - AUTH_BASE_URL=/auth
        - UI_BASE=/u
        - REDIRECT_URL_ARGKEY=next
    deploy:
      labels:
        gateway.route: u
        gateway.port: 8080
    networks:
      - gateway_net

  ui_404:
    image: ui_404:latest
    build:
      context: ./app/ui_404
      dockerfile: Dockerfile
      args:
        - REDIRECT_URL=/
        - REDIRECT_TIMEOUT=10
    deploy:
      labels:
        gateway.route: _404_
        gateway.port: 8080
    networks:
      - gateway_net

  rq_redis:
    image: redis
    restart: always
    # expose Redis port only for testing!
    #ports:
    #  - 6379:6379
    volumes:
      - ./mnt/redis_dump:/data
    command: >
      redis-server
      --maxmemory ${JFS_REDIS_MAX_MEMORY:-128mb}
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy_net

  rq_api:
    image: sandbox:latest
    build:
      context: ./app/sandbox
      dockerfile: Dockerfile

networks:
  gateway_net:
    driver: overlay
    attachable: true

  proxy_net:
    external: true
    name: g_proxy_net

volumes:
  etcd_data:
  acme_data:
