<!DOCTYPE html>
<html>
<body>
  <button onclick="location.href='/auth/google'">Login</button>
  <button onclick="document.cookie='jwt=;Max-Age=0';location.reload()">Logout</button>
  <p>JWT Cookie:</p>
  <pre id="jwt_cookie"></pre>
  <p>JWT Payload:</p>
  <pre id="jwt_payload"></pre>
  <script>
    const m = document.cookie.match(/jwt=([^;]+)/);
    if (m) {
      document.getElementById('jwt_cookie').innerText = m[1];
      document.getElementById('jwt_payload').innerText = atob(m[1].split('.')[1]);
    }
  </script>
</body>
</html>
