apisix:
  node_listen: 9080
  enable_ipv6: false
  enable_control: true
  dns_resolver:
    - 127.0.0.11
  control:
    ip: "0.0.0.0"
    port: 9092

deployment:
  admin:
    allow_admin:
      - 0.0.0.0/0
    admin_key:
      - name: "admin"
        key: "${{APISIX_ADMIN_KEY}}"
        role: admin
      - name: "viewer"
        key: "${{APISIX_VIEWER_KEY}}"
        role: viewer
  etcd:
    host:
      - "http://etcd:2379"
    prefix: "/apisix"
    timeout: 30

plugin_attr:
  prometheus:
    export_addr:
      ip: "0.0.0.0"
      port: 9091
  acme:
    account_email: "${{ACME_EMAIL}}"

nginx_config:
  http:
    real_ip_header: "X-Forwarded-For"
    real_ip_from:
      - "0.0.0.0/0"
