<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Code</title>
  </head>
  <body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f7; color: #333333;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%">
      <tr>
        <td align="center" style="padding: 40px 0;">
          <table border="0" cellpadding="0" cellspacing="0" width="400" style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 40px;">
            <tr>
              <td align="left" style="padding-bottom: 20px;">
                <h2 style="margin: 0; color: #1a1a1a; font-size: 24px;">Verification code</h2>
              </td>
            </tr>

            <tr>
              <td align="left" style="padding-bottom: 30px; line-height: 1.6;">
                Enter the following <strong>verification code</strong> to continue login or registration:
              </td>
            </tr>

            <tr>
              <td align="center" style="padding-bottom: 30px;">
                <div style="background-color: #f0f4f8; border-radius: 4px; padding: 20px; font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #0052cc; border: 1px dashed #0052cc;">
                  __CODE__
                </div>
              </td>
            </tr>

            <tr>
              <td align="left" style="padding-bottom: 40px; font-size: 14px; color: #666666;">
                To protect your account, do not share this code.
              </td>
            </tr>

            <tr>
              <td style="border-top: 1px solid #eeeeee; padding-top: 20px;">
                <p style="margin: 0 0 10px 0; font-weight: bold; font-size: 14px;">Didn't request this?</p>
                <p style="margin: 0; font-size: 13px; color: #888888; line-height: 1.5;">
                If you didn't make this request, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
