<!DOCTYPE html>
<html>
<body>
    <h1>Sign in</h1>
    <form id="login-form">
        <input type="text" id="username" placeholder="Username" required><br>
        <input type="password" id="password" placeholder="Password" required><br>
        <button type="submit">Sign in</button>
    </form>
    <hr>
    <button onclick="location.href='./oauth2/google'">Login with Google</button>

    <script>
        document.getElementById("login-form").onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const resp = await fetch("__AUTH_BASE_URL__/authentication", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password }),
            });
            const result = await resp.json();
            if (result.pass) {
                location.href = new URLSearchParams(location.search).get("next") || "./private";
            } else {
                alert(result.msg?.errmsg || "Login failed");
            }
        };
    </script>
</body>
</html>
