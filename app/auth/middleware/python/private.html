<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private page</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    pre {
      text-align: left;
      background: #f6f8fa;
      border: 1px solid #e0e4ea;
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.85rem;
      line-height: 1.5;
      overflow-x: auto;
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .badge {
      display: inline-block;
      background: #eaf0ff;
      color: #4f80ff;
      border-radius: 999px;
      padding: 0.25rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    a {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #444;
      text-decoration: none;
      transition: background 0.15s;
    }

    a:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Authenticated</span>
    <h1>Welcome, __USERNAME__</h1>
    <p>You have successfully passed JWT middleware verification.<br>
       This page is only accessible with a valid token.</p>
    <pre>__PAYLOAD__</pre>
    <a href="/login">Sign out</a>
  </div>
</body>
</html>
