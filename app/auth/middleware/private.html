<!DOCTYPE html>
<html>
<body>
    <h1>Welcome, __USERNAME__</h1>
    <pre id="out">__PAYLOAD__</pre>
    <a href="./login?logout=true">Sign out</a>
    <script>
        // Minimal way to decode JWT from cookie for learning
        const m = document.cookie.match(/__COOKIE_NAME__=([^;]+)/);
        if (m) {
            const payload = JSON.parse(atob(m[1].split('.')[1]));
            console.log("Decoded Token:", payload);
        }
    </script>
</body>
</html>
