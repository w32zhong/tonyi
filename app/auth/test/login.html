<!DOCTYPE html>
<html>
<head>
    <title>Sign in</title>
    <style>
        #result {
            background: #f4f4f4;
            padding: 10px;
            border: 1px solid #ddd;
            min-height: 50px;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <p><a href="./private">Go to Private Page</a></p>

    <h3>Sign in by email</h3>
    <form id="login-verify-form">
        <input type="email" id="email-verify" placeholder="Email" required><br>
        <button type="button" id="send-code-btn">Send Verification Code</button><br>
        <input type="text" id="verification-code" placeholder="Verification Code" required><br>
        <button type="submit">Sign in</button>
    </form>

    <h3>Sign in by email and password</h3>
    <form id="login-password-form">
        <input type="email" id="email-password" placeholder="Email" required><br>
        <input type="password" id="password" placeholder="Password" required><br>
        <button type="submit">Sign in</button>
    </form>

    <h3>Sign in by OAuth2</h3>
    <button onclick="oauthLogin('google')">Login with Google</button>
    <button onclick="oauthLogin('github')">Login with GitHub</button>

    <h3>Result</h3>
    <pre id="result">(none)</pre>

    <script type="module">
        import { solve } from './busybot.mjs';
        const REDIRECT_URL_ARGKEY = "__REDIRECT_URL_ARGKEY__";
        const AUTH_BASE_URL = "__AUTH_BASE_URL__";
        let emailSalt = null;

        function showResult(json) {
            const resultDisplay = document.getElementById("result");
            resultDisplay.textContent = JSON.stringify(json, null, 2);
        }

        const params = new URLSearchParams(location.search);
        if (params.get("logout") === "true") {
            showResult("You have been logged out.");
        }

        async function login(jsonParam) {
            try {
                const resp = await fetch(`${AUTH_BASE_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(jsonParam)
                });
                const result = await resp.json();
                showResult(result);

                if (result.pass) {
                    const next = new URLSearchParams(location.search).get(REDIRECT_URL_ARGKEY);
                    setTimeout(() => location.href = next || '/', 1000);
                }
            } catch (err) {
                showResult("Error: " + err.message);
            }
        }

        document.getElementById("send-code-btn").onclick = async () => {
            const email = document.getElementById("email-verify").value;
            if (!email) { alert("Email is required"); return; }

            const btn = document.getElementById("send-code-btn");
            const originalText = btn.textContent;
            btn.disabled = true;

            try {
                const chalResp = await fetch(`${AUTH_BASE_URL}/challenge`);
                if (!chalResp.ok) throw new Error("Failed to get challenge");
                const challengeData = await chalResp.json();
                console.log('challengeData', challengeData);

                const { challenge, signature } = challengeData;
                const solution = await solve(challenge);
                console.log('solution', solution);

                const emailResp = await fetch(`${AUTH_BASE_URL}/email`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, challenge, signature, solution })
                });
                const emailResult = await emailResp.json()
                console.log('emailResult', emailResult);

                if (emailResult.pass) {
                    emailSalt = emailResult.salt;
                    showResult(emailResult);
                } else {
                    alert(emailResult.errmsg || "Failed to send verification code");
                }
            } catch (err) {
                showResult("Error: " + err.message);
            } finally {
                btn.disabled = false;
            }
        };

        document.getElementById("login-verify-form").onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById("email-verify").value;
            const code = document.getElementById("verification-code").value;
            login({
                method: "email_verify",
                email,
                email_salt: emailSalt,
                code
            })
        };

        document.getElementById("login-password-form").onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById("email-password").value;
            const password = document.getElementById("password").value;
            login({
                method: "email_and_password",
                email,
                password
            })
        };

        window.oauthLogin = function(provider) {
            const params = new URLSearchParams(location.search);
            const next = params.get(REDIRECT_URL_ARGKEY);
            let url = `${AUTH_BASE_URL}/oauth2/${provider}`;
            if (next) {
                url += `?${REDIRECT_URL_ARGKEY}=${encodeURIComponent(next)}`;
            }
            location.href = url;
        };
    </script>
</body>
</html>
