<!DOCTYPE html>
<html>
<head>
    <title>__PAGE_TITLE__</title>
    <style>
        #result {
            background: #f4f4f4;
            padding: 10px;
            border: 1px solid #ddd;
            min-height: 50px;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div id="nav">
        <p><a href="./private">Go to Private Page</a></p>
    </div>

    <div id="profile" style="display: none;">
        <h3>__PAGE_TITLE__</h3>
        <p>JWT payload:</p><pre>__PAYLOAD__</pre>
        <p><a href="__REDIRECT_URL__?logout=true">Sign out</a></p>
    </div>

    <h3 id="title-email">Method 1: Email and verification code</h3>
    <form id="form-email">
        <input type="email" id="email-verify" placeholder="Email" required>
        <button type="button" id="send-code-btn">Send Verification Code</button>
        <input type="text" id="verification-code" placeholder="Verification Code">
        <button type="submit" id="submit-email">Submit</button>
    </form>

    <h3 id="title-password">Method 2: Password</h3>
    <form id="form-password">
        <input type="email" id="email-password" placeholder="Email">
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="submit-password">Submit</button>
    </form>

    <h3 id="title-oauth2">Method 3: OAuth2</h3>
    <div id="oauth2-buttons">
        <button onclick="oauthLogin('google')">Login with Google</button>
        <button onclick="oauthLogin('github')">Login with GitHub</button>
    </div>

    <h3>Result</h3>
    <pre id="result">(none)</pre>

    <script type="module">
        import { solve } from './busybot.mjs';
        const REDIRECT_URL_ARGKEY = "__REDIRECT_URL_ARGKEY__";
        const AUTH_BASE_URL = "__AUTH_BASE_URL__";
        const IS_PRIVATE = __IS_PRIVATE__;
        const USER = __PAYLOAD__;
        let emailSalt = null;

        function showResult(json) {
            const resultDisplay = document.getElementById("result");
            resultDisplay.textContent = JSON.stringify(json, null, 2);
        }

        const params = new URLSearchParams(location.search);
        if (params.get("logout") === "true") {
            showResult("You have been logged out.");
        }

        if (IS_PRIVATE) {
            document.getElementById("nav").style.display = "none";
            document.getElementById("profile").style.display = "block";

            // Remove the extra email input in password form because it's implicitly for the logged-in user
            document.getElementById("email-password").remove();
            document.getElementById("verification-code").remove();
            document.getElementById("send-code-btn").remove();

            // If user is currently logged in with OAuth2, show the binding link
            if (USER && USER.provider) {
                const btn = document.createElement("button");
                btn.textContent = `Bind ${USER.provider}`;
                btn.onclick = () => {
                    submitRequest(`${AUTH_BASE_URL}/change`, { method: "oauth2" });
                };
                document.getElementById("oauth2-buttons").appendChild(btn);
            }
        }

        async function submitRequest(url, jsonParam) {
            try {
                const resp = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(jsonParam)
                });
                const result = await resp.json();
                showResult(result);

                if (result.pass && !IS_PRIVATE) {
                    const next = new URLSearchParams(location.search).get(REDIRECT_URL_ARGKEY);
                    setTimeout(() => location.href = next || '/', 1000);
                }
            } catch (err) {
                showResult("Error: " + err.message);
            }
        }

        window.oauthLogin = function(provider) {
            const params = new URLSearchParams(location.search);
            const next = params.get(REDIRECT_URL_ARGKEY);
            let url = `${AUTH_BASE_URL}/oauth2/${provider}`;
            if (next) {
                url += `?${REDIRECT_URL_ARGKEY}=${encodeURIComponent(next)}`;
            }
            location.href = url;
        };

        const sendCodeBtn = document.getElementById("send-code-btn");
        if (sendCodeBtn) {
            sendCodeBtn.onclick = async () => {
                const email = document.getElementById("email-verify").value;
                if (!email) { alert("Email is required"); return; }
                const btn = document.getElementById("send-code-btn");
                btn.disabled = true;
                try {
                    const chalResp = await fetch(`${AUTH_BASE_URL}/challenge`);
                    if (!chalResp.ok) throw new Error("Failed to get challenge");
                    const challengeData = await chalResp.json();
                    const { challenge, signature } = challengeData;
                    const solution = await solve(challenge);
                    const emailResp = await fetch(`${AUTH_BASE_URL}/email`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, challenge, signature, solution })
                    });
                    const emailResult = await emailResp.json();
                    if (emailResult.pass) {
                        emailSalt = emailResult.salt;
                        showResult(emailResult);
                    } else {
                        alert(emailResult.errmsg || "Failed to send verification code");
                    }
                } catch (err) {
                    showResult("Error: " + err.message);
                } finally {
                    btn.disabled = false;
                }
            };
        }

        document.getElementById("form-email").onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById("email-verify").value;
            if (IS_PRIVATE) {
                submitRequest(`${AUTH_BASE_URL}/change`, { method: "email", email });
            } else {
                const code = document.getElementById("verification-code").value;
                if (!code) { alert("Verification Code is required"); return; }
                submitRequest(`${AUTH_BASE_URL}/login`, {
                    method: "email_verify",
                    email,
                    email_salt: emailSalt,
                    code
                });
            }
        };

        document.getElementById("form-password").onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById("password").value;
            if (IS_PRIVATE) {
                submitRequest(`${AUTH_BASE_URL}/change`, { method: "password", password });
            } else {
                const email = document.getElementById("email-password").value;
                if (!email) { alert("Email is required"); return; }
                submitRequest(`${AUTH_BASE_URL}/login`, {
                    method: "email_and_password",
                    email,
                    password
                });
            }
        };
    </script>
</body>
</html>
