apisix:
  node_listen: 80
  ssl:
    enable: true
    listen:
      - port: 443
  enable_ipv6: false
  enable_control: true
  dns_resolver:
    - 127.0.0.11
  control:
    ip: "0.0.0.0"
    port: 9092

deployment:
  admin:
    admin_listen:
      ip: 0.0.0.0
      port: 9180
    allow_admin:
      - 0.0.0.0/0
    admin_key:
      - name: "admin"
        key: "${{APISIX_ADMIN_KEY}}"
        role: admin
      - name: "viewer"
        key: "${{APISIX_VIEWER_KEY}}"
        role: viewer
  etcd:
    host:
      - "http://etcd:2379"
    prefix: "/apisix"
    timeout: 30

plugin_attr:
  prometheus:
    export_addr:
      ip: "0.0.0.0"
      port: 9091

nginx_config:
  worker_rlimit_nofile: 65535
  events:
    worker_connections: 20480
  http:
    # uncomment in case another load balancer sits in front of the Swarm
    #real_ip_header: "X-Forwarded-For"
    #real_ip_from:
    #  - "0.0.0.0/0"
  http_snippet: |
    # optimize large file performance
    sendfile             on;
    output_buffers   1 128k;
    sendfile_max_chunk 512k;

    # gzip configs
    gzip on;
    gzip_disable "msie6";
    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/gif image/png image/jpeg image/svg+xml image/x-icon;

    # proxy settings for streaming and uploads
    proxy_cache off;
    proxy_redirect off;
    proxy_buffering off;
    client_max_body_size 100m;
