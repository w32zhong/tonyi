env DEFAULT_REQ_RATE;
env DEFAULT_BURST;
env DEFAULT_CONN_MAX;

user root root;
worker_processes 2;
error_log stderr notice;

events {
    worker_connections 1024;
}

http {
    include /etc/openresty/mime.types;

    #error_log /root/logs/error.log; # Deploy
    error_log /dev/stderr notice;    # Develop

    access_log /root/logs/access.log;

    # Docker built-in service DNS
    resolver 127.0.0.11 valid=30s ipv6=off;

    # improve large file performance
    sendfile             on;
    output_buffers   1 128k;
    sendfile_max_chunk 512k;

    # gzip configs
    gzip on;
    gzip_disable "msie6";
    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/gif
        image/png
        image/jpeg
        image/svg+xml
        image/x-icon;

    # allocate Lua memory:
    lua_shared_dict req_store 10m;
    lua_shared_dict conn_store 10m;
    lua_shared_dict route_map 8m;
    lua_shared_dict route_rrb 8m;
    lua_shared_dict protected 8m;
    lua_shared_dict metrics 10m;
    lua_shared_dict JWT 10m;

    # Lua entrypoint
    lua_socket_log_errors on;
    init_worker_by_lua_file ./init.lua;

    server {
        listen 80 default_server;

        # a redirection from HTTPS to HTTP (Moved Permanently)
        location / {
            access_by_lua_file ./rate_limit.lua;
            return 301 https://$host$request_uri;
        }
    }

    server {
        # expose 443 port as HTTP by default, to facilitate local testing:
        # docker run -it -p 80:443 gateway
        # http://localhost/.well-known/test.html
        #
        # in deployment, when DOMAIN is specified, docker entrypoint would
        # automatically delete and uncomment below to switch to HTTPs.

        listen 443 default_server; # DELETE_THIS
        listen [::]:443 default_server; # DELETE_THIS
        # UNCOMMENT_THIS listen 443 ssl default_server;
        # UNCOMMENT_THIS listen [::]:443 ssl default_server;
        # UNCOMMENT_THIS ssl_certificate /root/cert.pem;
        # UNCOMMENT_THIS ssl_certificate_key /root/key.pem;

        server_name  _;
        location / {
            # placeholder Lua variables
            set $service_addr '';
            set $service_route '_root_';
            set $modified_uri '/';
            access_by_lua_file ./rewrite.lua;

            include proxy.conf;
            proxy_pass http://$service_addr;
        }

        location ~ ^/([^/]+)(.*) {
            # placeholder Lua variables
            set $service_addr '';
            set $service_route $1;
            set $modified_uri $2;
            access_by_lua_file ./rewrite.lua;

            include proxy.conf;
            proxy_pass http://$service_addr$modified_uri$is_args$args;
        }

        location ^~ /.well-known/ {
            access_by_lua_file ./rate_limit.lua;
            default_type text/plain;
            root /root/http_root;
        }

        location = /metrics {
            access_by_lua_file ./rate_limit.lua;
            content_by_lua_block {
                metric_connections:set(ngx.var.connections_active,  {"active"})
                metric_connections:set(ngx.var.connections_reading, {"reading"})
                metric_connections:set(ngx.var.connections_waiting, {"waiting"})
                metric_connections:set(ngx.var.connections_writing, {"writing"})

                prometheus:collect()
            }
        }

        log_by_lua_block {
            metric_request_uri:inc(1, {ngx.var.uri, ngx.var.status})
            metric_response_bytes:inc(tonumber(ngx.var.bytes_sent), {ngx.var.uri})
            metric_request_timecost:inc(tonumber(ngx.var.request_time), {ngx.var.uri})

            local ctx = ngx.ctx
            local lim = ctx.limit_conn
            if lim then
                -- total time minus artificial delay is essentially the actual process time
                local latency = tonumber(ngx.var.request_time) - ctx.limit_conn_delay
                local key = ctx.limit_conn_key
                local conn, err = lim:leaving(key, latency)
                if not conn then
                    ngx.log(ngx.ERR, "failed in a leaving connection:", err)
                    return
                end
            end
        }
    }
}
