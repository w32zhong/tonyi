services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: always
    ports:
      - "9443:9443" # HTTPS WebUI
      #- "8000:8000" # HTTP WebUI
      - "9000:9000"
    privileged: true
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
